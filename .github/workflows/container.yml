name: Build and Push Container

on:
  push:
    tags:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            suffix: amd64
          - runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Derive version tag
        id: version
        run: echo "tag=$(echo '${{ github.ref_name }}' | sed 's/\//-/g')" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build -f docker/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/sealion:latest-${{ matrix.suffix }} \
            -t ${{ secrets.DOCKER_USERNAME }}/sealion:${{ steps.version.outputs.tag }}-${{ matrix.suffix }} \
            .

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/sealion:latest-${{ matrix.suffix }}
          docker push ${{ secrets.DOCKER_USERNAME }}/sealion:${{ steps.version.outputs.tag }}-${{ matrix.suffix }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Derive version tag
        id: version
        run: echo "tag=$(echo '${{ github.ref_name }}' | sed 's/\//-/g')" >> "$GITHUB_OUTPUT"

      - name: Create and push latest manifest
        run: |
          docker manifest create ${{ secrets.DOCKER_USERNAME }}/sealion:latest \
            ${{ secrets.DOCKER_USERNAME }}/sealion:latest-amd64 \
            ${{ secrets.DOCKER_USERNAME }}/sealion:latest-arm64
          docker manifest push ${{ secrets.DOCKER_USERNAME }}/sealion:latest

      - name: Create and push version manifest
        run: |
          docker manifest create ${{ secrets.DOCKER_USERNAME }}/sealion:${{ steps.version.outputs.tag }} \
            ${{ secrets.DOCKER_USERNAME }}/sealion:${{ steps.version.outputs.tag }}-amd64 \
            ${{ secrets.DOCKER_USERNAME }}/sealion:${{ steps.version.outputs.tag }}-arm64
          docker manifest push ${{ secrets.DOCKER_USERNAME }}/sealion:${{ steps.version.outputs.tag }}
